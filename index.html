<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>房屋家具配置工具</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<header class="topbar">
  <div class="brand"><span class="brand-mark">▦</span> 房屋家具配置 <span class="ver">v2</span></div>
  <div class="toolgroups">
    <div class="group">
      <button id="btnUndo" title="復原 (Ctrl+Z)"><svg viewBox="0 0 24 24"><path d="M3 12a9 9 0 1 0 3-6.7L3 8"/><path d="M3 3v5h5"/></svg><span>復原</span></button>
      <button id="btnRedo" title="重做 (Ctrl+Y)"><svg viewBox="0 0 24 24"><path d="M21 12a9 9 0 1 1-3-6.7L21 8"/><path d="M21 3v5h-5"/></svg><span>重做</span></button>
    </div>
    <div class="group">
      <button id="btnExample" title="載入三房兩廳範例"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="7" rx="1"/><rect x="3" y="14" width="9" height="7" rx="1"/><rect x="16" y="14" width="5" height="7" rx="1"/></svg><span>範例</span></button>
    </div>
    <div class="group">
      <button id="btnSave" class="primary" title="存成自含 HTML"><svg viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><path d="M17 21v-8H7v8"/><path d="M7 3v5h8"/></svg><span>存檔</span></button>
      <button id="btnLoad" title="讀取 .html / .json 續編"><svg viewBox="0 0 24 24"><path d="m6 14 1.5-2.9A2 2 0 0 1 9.24 10H20a2 2 0 0 1 1.94 2.5l-1.55 6a2 2 0 0 1-1.94 1.5H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h3.9a2 2 0 0 1 1.69.9l.82 1.2a2 2 0 0 0 1.7.9H18a2 2 0 0 1 2 2v2"/></svg><span>讀取</span></button>
      <input type="file" id="fileInput" accept=".html,.json" hidden>
    </div>
    <div class="group">
      <button id="btnCopy" title="複製目前分頁平面圖"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.1-3.1a2 2 0 0 0-2.8 0L6 21"/></svg><span>複製圖</span></button>
      <button id="btnShare" title="複製分享連結"><svg viewBox="0 0 24 24"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><path d="M16 6l-4-4-4 4"/><path d="M12 2v13"/></svg><span>分享</span></button>
      <button id="btnPrint" title="列印 / 另存 PDF"><svg viewBox="0 0 24 24"><path d="M6 9V2h12v7"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg><span>列印</span></button>
    </div>
    <div class="group">
      <button id="btnClear" class="danger" title="清空目前分頁"><svg viewBox="0 0 24 24"><path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg><span>清空</span></button>
    </div>
  </div>
</header>

<nav class="tabbar" id="tabbar" aria-label="格局分頁"></nav>

<main class="layout">
  <aside class="sidebar">
    <section class="panel">
      <h2>房屋尺寸</h2>
      <div class="row">
        <label>寬 <input type="number" id="areaW" class="num" min="100" max="3000" step="10"> cm</label>
        <label>深 <input type="number" id="areaH" class="num" min="100" max="3000" step="10"> cm</label>
      </div>
      <p class="pyeong num" id="pyeong">0 坪</p>
      <div class="row">
        <label>格線 <select id="gridSel">
          <option value="5">5 cm</option>
          <option value="10" selected>10 cm</option>
          <option value="25">25 cm</option>
          <option value="50">50 cm</option>
        </select></label>
        <label class="chk"><input type="checkbox" id="snapChk" checked> 吸附格線</label>
      </div>
      <label class="chk"><input type="checkbox" id="areaChk"> 顯示房間面積</label>
    </section>

    <section class="panel" id="editorSection">
      <h2>編輯選取</h2>
      <div id="editor"><p class="hint">點選畫布上的家具／牆／文字來編輯。</p></div>
    </section>

    <section class="panel">
      <h2>模式</h2>
      <div class="modes">
        <button id="modeSelect" class="mode active"><svg viewBox="0 0 24 24"><path d="M3 3l7.07 16.97 2.51-7.39 7.39-2.51L3 3z"/></svg><span>選取</span></button>
        <button id="modePan" class="mode"><svg viewBox="0 0 24 24"><path d="M18 11V6a2 2 0 0 0-4 0"/><path d="M14 10V4a2 2 0 0 0-4 0v2"/><path d="M10 10.5V6a2 2 0 0 0-4 0v8"/><path d="M18 8a2 2 0 1 1 4 0v6a8 8 0 0 1-8 8h-2c-2.8 0-4.5-.86-6-2.34l-3.6-3.6a2 2 0 0 1 2.83-2.82L7 15"/></svg><span>平移</span></button>
        <button id="modeWall" class="mode"><svg viewBox="0 0 24 24"><path d="M21.3 8.7 8.7 21.3a1 1 0 0 1-1.4 0l-4.6-4.6a1 1 0 0 1 0-1.4L15.3 2.7a1 1 0 0 1 1.4 0l4.6 4.6a1 1 0 0 1 0 1.4Z"/><path d="m7.5 10.5 2 2"/><path d="m10.5 7.5 2 2"/><path d="m13.5 4.5 2 2"/></svg><span>畫牆</span></button>
        <button id="modeMeasure" class="mode"><svg viewBox="0 0 24 24"><path d="M21 3 3 21"/><path d="M3 15v6h6"/><path d="M15 3h6v6"/></svg><span>量測</span></button>
      </div>
      <button id="addText" class="toolwide"><svg viewBox="0 0 24 24"><path d="M4 7V4h16v3"/><path d="M9 20h6"/><path d="M12 4v16"/></svg><span>加文字</span></button>
      <p class="hint" id="modeHint">拖曳家具移動；拖空白處框選多個；Shift 點擊加選。</p>
      <p class="hint">滾輪縮放；空白鍵或中鍵拖曳平移。</p>
    </section>

    <section class="panel">
      <h2>家具目錄 <span class="sub">拖曳放入畫布</span></h2>
      <div id="catalog"></div>
    </section>
  </aside>

  <div class="canvas-wrap">
    <svg id="board" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet"></svg>
    <div id="emptyHint" class="empty-hint" hidden>從左側<b>拖家具</b>進來，或按上方 <b>範例</b> 開始</div>
    <div class="zoom-ctl" role="group" aria-label="縮放">
      <button id="zoomOut" aria-label="縮小"><svg viewBox="0 0 24 24"><path d="M5 12h14"/></svg></button>
      <button id="zoomLabel" class="num" title="重設縮放">100%</button>
      <button id="zoomIn" aria-label="放大"><svg viewBox="0 0 24 24"><path d="M5 12h14"/><path d="M12 5v14"/></svg></button>
      <button id="zoomFit" title="符合視窗" aria-label="符合視窗"><svg viewBox="0 0 24 24"><path d="M8 3H5a2 2 0 0 0-2 2v3"/><path d="M21 8V5a2 2 0 0 0-2-2h-3"/><path d="M3 16v3a2 2 0 0 0 2 2h3"/><path d="M16 21h3a2 2 0 0 0 2-2v-3"/></svg></button>
    </div>
    <div id="toast" class="toast"></div>
  </div>
</main>

<script src="app.js" defer></script>
</body>
</html>
